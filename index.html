<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diretório Acadêmico de Enfermagem Irmã Ruth</title>
    
    <link rel="icon" type="image/png" href="images/Logotipo DAEIR-fotor-20260308125841.png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .main-header { 
            background-color: #ffffff; 
            color: var(--primary); 
            padding: 25px 0; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); 
            z-index: 10; 
            position: relative;
        }

        .logo-container { 
            display: flex; 
            align-items: center; 
            position: relative; 
            min-height: 80px; 
        }

        /* Efeito da Logo Grande Vazando (Overlap) */
        .logo { 
            position: absolute; 
            left: 0; 
            top: -15px; 
            width: 180px; /* LOGO BEM MAIOR */
            height: auto; 
            z-index: 2000; 
            border-radius: 50%; 
            filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.3)); /* Sombra 3D */
            transition: transform 0.4s ease;
        }

        .logo:hover {
            transform: scale(1.05); 
        }

        .header-text { 
            margin-left: 210px; /* Empurra o texto para dar espaço pra logo gigante */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-text h1 { 
            margin: 0; 
            font-size: 2rem; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            color: var(--primary); 
        }

        .chapa { 
            margin: 4px 0 0; 
            font-weight: 600; 
            color: var(--secondary); 
            font-size: 1.15rem; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }

        .main-nav { 
            background-color: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .main-nav .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            padding-left: 100px; /* Desvia os botões da logo */
        }
