<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAEIR</title>
    
    <link rel="icon" type="image/png" href="images/Logotipo DAEIR-fotor-20260308125841.png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        :root {
            --primary: #006847; /* Exemplo de verde DAEIR */
            --secondary: #ce2029;
            --accent: #ffcc00;
            --light: #f4f4f4;
            --dark: #333;
        }

        .main-header { 
            background-color: #ffffff; 
            color: var(--primary); 
            padding: 25px 0; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); 
            z-index: 2000; 
            position: relative;
        }

        .logo-container { 
            display: flex; 
            align-items: center; 
            position: relative; 
            min-height: 80px; 
        }

        .logo { 
            position: absolute; 
            left: 10px; 
            top: -15px; 
            width: 180px; 
            height: auto; 
            z-index: 3000; 
            border-radius: 50%; 
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3)); 
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05); 
        }

        .header-text { 
            margin-left: 210px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-text h1 { 
            margin: 0; 
            font-size: 1.9rem; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            color: var(--primary); 
        }

        .chapa { 
            margin: 4px 0 0; 
            font-weight: 600; 
            color: var(--secondary); 
            font-size: 1.15rem; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }

        .main-nav { 
            background-color: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .nav-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 15px 20px;
            transition: color 0.3s;
        }

        /* AJUSTE PARA MANTER TUDO EM UMA LINHA */
        .nav-links {
            display: flex;
            flex-wrap: nowrap; /* Impede a quebra de linha */
            justify-content: flex-start;
            padding-left: 195px; /* Reduzido para dar espaço ao último item */
            width: 100%;
        }

        .nav-links a { 
            color: rgba(255, 255, 255, 0.9); 
            text-decoration: none; 
            padding: 16px 12px; /* Reduzido o padding lateral para caber tudo */
            display: inline-block; 
            transition: 0.3s; 
            font-size: 0.9rem; /* Fonte levemente menor para garantir a linha única */
            font-weight: 500; 
            position: relative;
            white-space: nowrap; /* Evita que o texto quebre dentro do próprio link */
        }
        
        .nav-links a::after { content: ''; position: absolute; width: 0; height: 3px; bottom: 0; left: 50%; background-color: var(--accent); transition: 0.3s; transform: translateX(-50%); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a:hover { color: white; background-color: rgba(255,255,255,0.05);}
        .nav-links a i { margin-right: 6px; }

        @media (max-width: 1100px) {
            .nav-links a { font-size: 0.85rem; padding: 16px 8px; }
            .nav-links { padding-left: 185px; }
        }

        @media (max-width: 950px) {
            .logo-container { flex-direction: column; text-align: center; }
            .logo { 
                position: relative; 
                top: 0; 
                left: 0;
                width: 130px; 
                margin-bottom: 20px; 
                display: block;
            }
            .header-text { margin-left: 0; }
            .header-text h1 { font-size: 1.5rem; text-align: center; }
            
            .mobile-menu-btn {
                display: block;
                width: 100%;
                text-align: center;
                background-color: var(--primary);
            }

            .nav-links { 
                flex-direction: column;
                padding-left: 0;
                position: absolute;
                top: 100%;
                left: 0;
                background-color: var(--primary);
                width: 100%;
                box-shadow: 0 10px 15px rgba(0,0,0,0.1);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.4s ease-out;
            }

            .nav-links.active {
                max-height: 500px;
            }

            .nav-links a {
                display: block;
                text-align: center;
                padding: 15px 20px;
                border-top: 1px solid rgba(255,255,255,0.05);
            }
            
            .nav-links a::after { display: none; }
        }
    </style>
</head>
<body>

    <header class="main-header" data-aos="fade-down" data-aos-duration="800">
        <div class="container logo-container">
            <img src="images/Logotipo DAEIR-fotor-20260308125841.png" alt="Logo" class="logo anime-float">
            <div class="header-text">
                <h1>Diretório Acadêmico de Enfermagem Irmã Ruth - DAEIR</h1>
                <p class="chapa">Gestão 2025 - 2026</p>
            </div>
        </div>
    </header>

    <nav class="main-nav" data-aos="fade-down" data-aos-duration="800" data-aos-delay="100">
        <div class="container nav-container">
            <button class="mobile-menu-btn" id="menuToggle" aria-label="Abrir menu">
                <i class="fas fa-bars"></i> Menu
            </button>
            
            <div class="nav-links" id="navLinks">
                <a href="#inicio"><i class="fas fa-home"></i> Início</a>
                <a href="#nic"><i class="fas fa-microscope"></i> Ciência</a>
                <a href="#atletica"><i class="fas fa-trophy"></i> Atlética</a>
                <a href="#noticias"><i class="fas fa-newspaper"></i> Notícias</a>
                <a href="#downloads"><i class="fas fa-download"></i> Downloads</a>
                <a href="#contato"><i class="fas fa-envelope"></i> Contato</a>
            </div>
        </div>
    </nav>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 100 });

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const icon = menuToggle.querySelector('i');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            if(navLinks.classList.contains('active')) {
                icon.classList.replace('fa-bars', 'fa-times');
            } else {
                icon.classList.replace('fa-times', 'fa-bars');
            }
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                icon.classList.replace('fa-times', 'fa-bars');
            });
        });
    </script>
</body>
</html>
